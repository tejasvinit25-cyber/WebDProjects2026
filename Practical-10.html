<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional iframe Webpage</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f7;
        }

        header {
            background: #1f2d3d;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            flex: 1;
            padding: 15px;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
        }

        iframe {
            width: 100%;
            height: 400px;
            border: none;
            border-radius: 8px;
        }

        footer {
            background: #1f2d3d;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>Web Designing Practical</h1>
    <p>Embedding External Webpage and Map using iframe</p>
</header>

<div class="container">

    <!-- External Website Section -->
    <div class="card">
        <h2>External Website</h2>
        <iframe 
            src="https://www.wikipedia.org" 
            title="Wikipedia">
        </iframe>
    </div>

    <!-- Google Map Section -->
    <div class="card">
        <h2>Location Map</h2>
        <iframe 
            src="https://www.google.com/maps?q=Nagpur&output=embed"
            allowfullscreen
            loading="lazy"
            title="Nagpur Map">
        </iframe>
    </div>

</div>

<footer>
    <p>© 2026 Web Designing Lab</p>
</footer>

</body>
</html>
